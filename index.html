<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROMHOUSE Management System</title>
    <!-- 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide-react"></script>
    <!-- Firebase SDK (Compat version for stability) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto+Sans+KR', sans-serif; 
            background-color: #e2e8f0; 
            margin:0; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .active-scale:active { transform: scale(0.95); }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .tabular-nums { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Identifier 'Infinity' has already been declared 오류 방지를 위해 
        // 최상위 스코프에 변수를 직접 선언하지 않고 React 구문을 사용합니다.
        
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // 아이콘 안전 로딩용 헬퍼
        const SafeIcon = ({ name, size = 20, className = "", strokeWidth = 2.5 }) => {
            const lib = window.lucideReact || {};
            const pascalName = name.split('-').map(part => part.charAt(0).toUpperCase() + part.slice(1)).join('');
            const IconComponent = lib[pascalName] || lib['HelpCircle'] || (() => null);
            return <IconComponent size={size} className={className} strokeWidth={strokeWidth} />;
        };

        const CHECKLIST_KEYS = [
            { key: 'utensils', label: '집기류' }, { key: 'lights', label: '조명' },
            { key: 'bathroom', label: '화장실' }, { key: 'floor', label: '바닥청소' },
            { key: 'terrace', label: '테라스' }, { key: 'tv', label: 'TV' },
            { key: 'mosquito', label: '모기향' }, { key: 'aircon', label: '에어컨' },
            { key: 'plants', label: '화분' }, { key: 'boiler', label: '보일러' }
        ];

        // [온라인 필수 설정] 시스템 아이디 및 파이어베이스 초기화
        const getAppId = () => typeof __app_id !== 'undefined' ? __app_id : 'romhouse-final-app';
        
        const initializeFirebase = () => {
            let fbConfig = null;
            try { fbConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null; } catch (e) {}
            if (fbConfig && fbConfig.apiKey && !firebase.apps.length) {
                firebase.initializeApp(fbConfig);
            }
            return { auth: firebase.auth(), db: firebase.firestore() };
        };

        const INITIAL_ROOMS = [
            { id: '1-S', name: '1인실', floor: 1, doorCode: '1121', status: '공실', guestName: '', memo: '', quickChecks: { terrace: false, window: false }, checklist: {} },
            { id: '1-A', name: 'A룸', floor: 1, doorCode: '1470', status: '공실', guestName: '', memo: '', quickChecks: { terrace: false, window: false }, checklist: {} },
            { id: '1-R', name: 'R룸', floor: 1, doorCode: '2580', status: '공실', guestName: '', memo: '', quickChecks: { terrace: false, window: false }, checklist: {} },
            { id: '2-O', name: 'O룸', floor: 2, doorCode: '3690', status: '공실', guestName: '', memo: '', quickChecks: { terrace: false, window: false }, checklist: {} },
            { id: '2-M', name: 'M룸', floor: 2, doorCode: '1230', status: '공실', guestName: '', memo: '', quickChecks: { terrace: false, window: false }, checklist: {} },
            { id: '3-I', name: 'I룸', floor: 3, doorCode: '4560', status: '공실', guestName: '', memo: '', quickChecks: { terrace: false, window: false }, checklist: {} },
            { id: '3-N', name: 'N룸', floor: 3, doorCode: '7890', status: '공실', guestName: '', memo: '', quickChecks: { terrace: false, window: false }, checklist: {} }
        ];

        const INITIAL_OUTDOORS = [
            {id:'pool', label:'수영장', icon:'waves', order:1},
            {id:'yard', label:'마당', icon:'tree-pine', order:2},
            {id:'bbq', label:'바베큐장', icon:'flame', order:3},
            {id:'trash', label:'쓰레기장', icon:'trash-2', order:4},
            {id:'stairs', label:'계단청소', icon:'layers', order:5},
            {id:'entrance', label:'현관등', icon:'lightbulb', order:6},
            {id:'dryer', label:'건조기', icon:'wind', order:7},
            {id:'laundry', label:'빨래', icon:'shirt', order:8},
            {id:'supplies', label:'비품', icon:'package', order:9}
        ];

        const Clock = () => {
            const [time, setTime] = useState(new Date());
            useEffect(() => {
                const t = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(t);
            }, []);
            return (
                <div className="text-center py-2 bg-slate-900/15 rounded-2xl mb-4 border border-white/10 shadow-inner">
                    <div className="text-[10px] text-slate-500 font-black uppercase mb-0.5 tracking-widest leading-none">
                        {time.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' })}
                    </div>
                    <div className="text-orange-600 font-black text-2xl tracking-tighter tabular-nums">
                        {time.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [rooms, setRooms] = useState(INITIAL_ROOMS);
            const [outdoors, setOutdoors] = useState(INITIAL_OUTDOORS.map(o => ({...o, checked: false})));
            const [dailyMemo, setDailyMemo] = useState("");
            const [selId, setSelId] = useState(null);
            const [loading, setLoading] = useState(true);
            
            const lastAutoUpdateRef = useRef(""); 
            const { auth, db } = useMemo(() => initializeFirebase(), []);
            const appId = useMemo(() => getAppId(), []);

            const activeRoom = useMemo(() => rooms.find(r => r.id === selId), [rooms, selId]);

            // 인증 로직
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) {
                        console.error("Auth Fail", e);
                        setLoading(false);
                    }
                };
                initAuth();
                const unsub = auth.onAuthStateChanged(u => {
                    setUser(u);
                    if (u) setLoading(false);
                });
                return () => unsub();
            }, [auth]);

            // 실시간 데이터 구독
            useEffect(() => {
                if (!user) return;

                const rRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms');
                const oRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('outdoor');
                const mRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('summaries').doc('daily_memo');

                const unsubR = rRef.onSnapshot(s => {
                    if (s.empty) {
                        const b = db.batch();
                        INITIAL_ROOMS.forEach(r => b.set(rRef.doc(r.id), r));
                        b.commit();
                    } else {
                        setRooms(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    }
                }, err => console.error("Rooms sync error", err));

                const unsubO = oRef.onSnapshot(s => {
                    if (s.empty) {
                        const b = db.batch();
                        INITIAL_OUTDOORS.forEach((item) => b.set(oRef.doc(item.id), { ...item, checked: false }));
                        b.commit();
                    } else {
                        setOutdoors(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.order - b.order));
                    }
                }, err => console.error("Outdoor sync error", err));

                const unsubM = mRef.onSnapshot(s => {
                    if (s.exists) {
                        setDailyMemo(s.data().content || "");
                    } else {
                        mRef.set({ content: "" });
                    }
                }, err => console.error("Memo sync error", err));

                return () => { unsubR(); unsubO(); unsubM(); };
            }, [user, db, appId]);

            // 오후 5:50 자동 요약
            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date();
                    const h = now.getHours();
                    const m = now.getMinutes();
                    const s = now.getSeconds();
                    const todayKey = now.toDateString();

                    if (h === 17 && m === 50 && s === 0 && lastAutoUpdateRef.current !== todayKey) {
                        lastAutoUpdateRef.current = todayKey;
                        
                        const inRooms = rooms.filter(r => r.status === '입실').map(r => r.name).join(', ');
                        const stayRooms = rooms.filter(r => r.status === '연박').map(r => r.name).join(', ');
                        const emptyRooms = rooms.filter(r => r.status === '공실').map(r => r.name).join(', ');
                        
                        const summaryText = `[${now.toLocaleDateString()}] 오후 5:50 현황\n입실: ${inRooms || '없음'}\n연박: ${stayRooms || '없음'}\n공실: ${emptyRooms || '없음'}`;
                        
                        updateMemoInDb(summaryText);
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, [rooms]);

            const updateDb = async (col, id, fields) => {
                if (!user) return;
                
                // 낙관적 업데이트
                if (col === 'rooms') {
                    setRooms(prev => prev.map(r => {
                        if (r.id !== id) return r;
                        const newRoom = JSON.parse(JSON.stringify(r));
                        for (const key in fields) {
                            if (key.includes('.')) {
                                const [parent, child] = key.split('.');
                                newRoom[parent] = { ...newRoom[parent], [child]: fields[key] };
                            } else {
                                newRoom[key] = fields[key];
                            }
                        }
                        return newRoom;
                    }));
                } else {
                    setOutdoors(prev => prev.map(o => o.id === id ? { ...o, ...fields } : o));
                }

                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col).doc(id).update(fields);
                } catch (e) {
                    console.error("Update Fail", e);
                }
            };

            const updateMemoInDb = async (newContent) => {
                if (!user) return;
                setDailyMemo(newContent);
                try {
                    const mRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('summaries').doc('daily_memo');
                    await mRef.set({ content: newContent }, { merge: true });
                } catch (e) {
                    console.error("Memo Update Fail", e);
                }
            };

            const handleVacancyReset = async (roomId) => {
                const resetFields = {
                    status: '공실',
                    guestName: '',
                    checklist: CHECKLIST_KEYS.reduce((acc, curr) => ({ ...acc, [curr.key]: false }), {}),
                    quickChecks: { terrace: false, window: false }
                };
                await updateDb('rooms', roomId, resetFields);
                setSelId(null);
            };

            const getBg = (s) => {
                if (s === '입실') return 'bg-emerald-600 text-white shadow-lg border-emerald-700';
                if (s === '연박') return 'bg-slate-400 text-white shadow-lg border-slate-500'; 
                return 'bg-white text-slate-500 border-2 border-slate-200';
            };

            const RoomCard = ({ room }) => {
                const isAllDone = CHECKLIST_KEYS.every(k => room.checklist?.[k.key] === true);
                const hasMemoContent = room.memo && room.memo.trim().length > 0;
                
                return (
                    <div onClick={() => setSelId(room.id)} className={`relative flex flex-col items-center py-3 w-[105px] h-[255px] sm:w-[135px] sm:h-[280px] rounded-[32px] border-b-4 active-scale ${getBg(room.status)} cursor-pointer transition-all fade-in`}>
                        <span className="text-3xl font-black mb-1 tracking-tighter uppercase leading-none">{room.name}</span>
                        <div className={`text-xl font-black px-2 py-0.5 rounded-lg mb-1 ${room.status==='공실'?'bg-slate-100 text-slate-800':'bg-black/20 text-white'}`}>{room.doorCode}</div>
                        <span className="text-[10px] font-black mb-1 truncate px-1 text-center w-full h-3">
                            {room.guestName || (room.status==='공실'?"":"정보 없음")}
                        </span>
                        
                        <div className="flex flex-col gap-0.5 mb-2 items-center scale-95">
                            <div className={`flex items-center gap-1 text-[8px] font-black px-1.5 py-0.5 rounded-full ${isAllDone?'bg-emerald-500 text-white':'bg-orange-500 text-white'}`}>
                                {isAllDone?'완료':'점검중'}
                            </div>
                            {hasMemoContent && (
                                <div className="text-[8px] font-black px-1.5 py-0.5 rounded-full bg-purple-600 text-white shadow-sm">메모 있음</div>
                            )}
                        </div>

                        <span className={`text-[9px] font-black uppercase mt-auto mb-1.5 px-2 py-0.5 rounded-lg bg-black/10`}>{room.status}</span>

                        <div className="w-full px-1 flex justify-center gap-1.5 pt-1.5 border-t border-black/5 mt-auto">
                            {['terrace', 'window'].map(q => (
                                <div key={q} onClick={e => {e.stopPropagation(); updateDb('rooms', room.id, {[`quickChecks.${q}`]: !room.quickChecks?.[q]});}} className={`flex flex-col items-center gap-0.5 ${room.quickChecks?.[q]?'opacity-100':'opacity-30'}`}>
                                    <SafeIcon name="check-square" size={14} className={room.quickChecks?.[q]?(room.status==='공실'?'text-emerald-600':'text-yellow-300'):''} />
                                    <span className="text-[7px] font-black">{q==='terrace'?'테라스':'유리창'}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            if (loading) return (
                <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center text-white p-6">
                    <div className="w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="font-black tracking-widest uppercase text-xs">ROMHOUSE CONNECTING...</p>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col bg-slate-200 overflow-x-hidden">
                    <header className="bg-slate-800 px-4 py-4 shadow-xl border-b border-slate-700 shrink-0">
                        <h1 className="text-3xl font-black text-white tracking-tighter text-center mb-2">ROMHOUSE</h1>
                        <Clock />
                    </header>

                    <main className="flex-1 p-1 flex flex-col gap-2 max-w-4xl mx-auto w-full pb-48 pt-1 scroll-hide overflow-y-auto">
                        {[1, 2, 3].map(floor => (
                            <section key={floor} className="space-y-1">
                                <div className="flex items-center gap-2 px-2">
                                    <span className="bg-slate-900 text-white text-[8px] px-1.5 py-0.5 rounded font-black">{floor}F</span>
                                    <div className="h-[1px] flex-1 bg-slate-300"></div>
                                </div>
                                <div className="flex justify-center flex-wrap gap-1.5 sm:gap-2">
                                    {rooms.filter(r => r.floor === floor).sort((a,b)=>a.id.localeCompare(b.id)).map(room => (
                                        <RoomCard key={room.id} room={room} />
                                    ))}
                                </div>
                            </section>
                        ))}

                        {/* 야외 점검 섹션 */}
                        <section className="bg-orange-500 rounded-[24px] p-4 shadow-xl border-b-8 border-orange-700 mt-2 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-12 bg-white/10 rounded-full -mr-6 -mt-6"></div>
                            <div className="mb-4 relative z-10">
                                <div className="flex justify-between items-center mb-3 px-1">
                                    <h2 className="text-white text-[11px] font-black uppercase tracking-widest">Outdoor Checklist</h2>
                                    <div className="flex gap-1.5">
                                        <button onClick={() => outdoors.forEach(o => updateDb('outdoor', o.id, {checked: true}))} className="bg-white/20 hover:bg-white/30 text-white text-[9px] font-black px-3 py-1.5 rounded-xl border border-white/30 active-scale">전체 체크</button>
                                        <button onClick={() => outdoors.forEach(o => updateDb('outdoor', o.id, {checked: false}))} className="bg-black/20 hover:bg-black/30 text-white text-[9px] font-black px-3 py-1.5 rounded-xl border border-black/10 active-scale">전체 해제</button>
                                    </div>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 relative z-10">
                                {outdoors.map(task => (
                                    <button 
                                        key={task.id} 
                                        onClick={() => updateDb('outdoor', task.id, {checked: !task.checked})} 
                                        className={`flex items-center gap-3 p-3 rounded-2xl transition-all active-scale border-2 shadow-sm ${task.checked?'bg-white text-orange-600 border-white':'bg-orange-600 text-orange-100 border-orange-400'}`}
                                    >
                                        <div className={`p-2 rounded-lg ${task.checked ? 'bg-orange-100' : 'bg-orange-700'}`}>
                                            <SafeIcon name={task.icon} size={20} />
                                        </div>
                                        <span className="text-[12px] font-black uppercase tracking-tight">{task.label}</span>
                                    </button>
                                ))}
                            </div>
                        </section>

                        {/* 일일 현황 메모장 */}
                        <section className="bg-slate-800 rounded-[24px] p-5 shadow-xl border-b-8 border-slate-900 mt-2 mb-20 relative z-10">
                            <div className="flex justify-between items-center mb-3 px-1">
                                <h2 className="text-white text-[12px] font-black uppercase tracking-widest flex items-center gap-2">
                                    <SafeIcon name="clipboard-list" size={16} className="text-orange-500" /> 일일 현황 메모장
                                </h2>
                                <span className="text-slate-400 text-[9px] font-bold">오후 5:50 자동 요약</span>
                            </div>
                            <textarea 
                                value={dailyMemo} 
                                onChange={(e) => updateMemoInDb(e.target.value)}
                                rows="6"
                                className="w-full bg-slate-700 border-2 border-slate-600 rounded-2xl px-5 py-4 text-white text-base font-bold focus:outline-none focus:border-orange-500 shadow-inner resize-none transition-all placeholder-slate-500"
                                placeholder="오후 5시 50분에 현황이 자동 기록됩니다. 직접 수정도 가능합니다."
                            />
                        </section>
                    </main>

                    {/* 상세 관리 모달창 */}
                    {activeRoom && (
                        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-50 flex items-end sm:items-center justify-center p-2">
                            <div className="bg-white w-full max-w-lg rounded-[40px] p-5 shadow-2xl border-t-[8px] border-slate-900 max-h-[95vh] overflow-y-auto scroll-hide">
                                <div className="flex justify-between items-start mb-5">
                                    <div>
                                        <h2 className="text-5xl font-black text-slate-900 tracking-tighter leading-none">{activeRoom.name}</h2>
                                        <div className="bg-blue-700 text-white px-3 py-1 rounded-lg font-black text-lg mt-1.5 inline-block">CODE: {activeRoom.doorCode}</div>
                                    </div>
                                    <button onClick={()=>setSelId(null)} className="p-2 bg-slate-100 rounded-full active-scale"><SafeIcon name="x" size={24} className="text-slate-400" /></button>
                                </div>

                                <div className="space-y-5 pb-4">
                                    <section>
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase mb-1.5 px-1 flex items-center gap-2"><SafeIcon name="user" size={12}/> 예약자 성함</h3>
                                        <input type="text" value={activeRoom.guestName||''} onChange={e=>updateDb('rooms', activeRoom.id, {guestName: e.target.value})} className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-4 py-2.5 text-xl font-black text-slate-900 focus:outline-none focus:border-blue-600 shadow-inner" placeholder="성함 입력" />
                                    </section>

                                    <section>
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase mb-2 flex items-center gap-2"><SafeIcon name="info" size={12}/> 투숙 상태 설정</h3>
                                        <div className="grid grid-cols-3 gap-2 bg-slate-100 p-1 rounded-2xl">
                                            {['입실','연박'].map(s => (
                                                <button key={s} onClick={()=>updateDb('rooms', activeRoom.id, {status:s})} className={`py-2.5 rounded-xl font-black text-base transition-all ${activeRoom.status===s ? 'bg-white text-slate-900 shadow-md scale-105' : 'text-slate-400'}`}>{s}</button>
                                            ))}
                                            <button onClick={() => handleVacancyReset(activeRoom.id)} className={`py-2.5 rounded-xl font-black text-base transition-all ${activeRoom.status==='공실'?'bg-white text-red-600 shadow-md scale-105' : 'text-slate-400'}`}>공실</button>
                                        </div>
                                    </section>

                                    <section>
                                        <div className="flex justify-between items-center mb-2 px-1">
                                            <h3 className="text-[10px] font-black text-slate-400 uppercase flex items-center gap-2"><SafeIcon name="check-circle" size={12}/> 시설 점검</h3>
                                            <div className="flex gap-1.5">
                                                <button onClick={()=>{const n={}; CHECKLIST_KEYS.forEach(i=>n[i.key]=true); updateDb('rooms', activeRoom.id, {checklist:n});}} className="text-[8px] font-black bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded-md active-scale">전체 체크</button>
                                                <button onClick={()=>{const n={}; CHECKLIST_KEYS.forEach(i=>n[i.key]=false); updateDb('rooms', activeRoom.id, {checklist:n});}} className="text-[8px] font-black bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-md active-scale">전체 해제</button>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            {CHECKLIST_KEYS.map(({key, label}) => {
                                                const isChecked = activeRoom.checklist?.[key] === true;
                                                return (
                                                    <button 
                                                        key={key} 
                                                        onClick={() => {
                                                            const currentChecklist = activeRoom.checklist || {};
                                                            updateDb('rooms', activeRoom.id, { [`checklist.${key}`]: !isChecked });
                                                        }} 
                                                        className={`flex items-center gap-2 p-2.5 rounded-xl border-2 transition-all text-left active-scale ${isChecked ? 'bg-emerald-50 border-emerald-500 text-emerald-900' : 'bg-slate-50 border-slate-100 text-slate-300'}`}
                                                    >
                                                        <div className={`w-5 h-5 rounded-md flex items-center justify-center border-2 transition-all ${isChecked ? 'bg-emerald-600 border-emerald-600 shadow-sm' : 'bg-white border-slate-200'}`}>
                                                            {isChecked && <SafeIcon name="check" size={14} className="text-white" strokeWidth={6} />}
                                                        </div>
                                                        <span className="text-[14px] font-black">{label}</span>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </section>

                                    <section>
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase mb-1.5 px-1 flex items-center gap-1">
                                            <SafeIcon name="file-text" size={12} /> 관리 메모 (공실 시에도 유지됨)
                                        </h3>
                                        <textarea value={activeRoom.memo||''} onChange={e=>updateDb('rooms', activeRoom.id, {memo: e.target.value})} rows="3" className="w-full bg-slate-50 border-2 border-slate-100 rounded-xl px-4 py-2 text-base font-bold text-slate-800 focus:outline-none focus:border-purple-600 shadow-inner resize-none transition-all" placeholder="특이사항을 기록하세요" />
                                    </section>
                                </div>
                                <button onClick={()=>setSelId(null)} className="w-full mt-2 py-4 bg-slate-900 text-white rounded-3xl font-black text-2xl border-b-8 border-black active-scale shadow-2xl">저장 및 닫기</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        }
    </script>
</body>
</html>
