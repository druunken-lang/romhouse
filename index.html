<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROMHOUSE Management System</title>
    <!-- React & Babel (JSX 컴파일용) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto+Sans+KR', sans-serif; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            CheckCircle, X, Info, Check, AlertCircle, 
            CheckSquare, Square, User, FileText, 
            Waves, TreePine, Flame, Trash2, 
            Layers, Lightbulb, Wind, Shirt, Package 
        } = lucideReact;

        // 환경 변수 처리 (Canvas 환경 또는 로컬 실행 대응)
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : { /* 로컬 테스트용 설정을 여기에 넣으세요 */ };
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'romhouse-production-v1';

        // Firebase 초기화 (Compat 모드)
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const App = () => {
            const [user, setUser] = useState(null);
            const [rooms, setRooms] = useState([]);
            const [outdoorTasks, setOutdoorTasks] = useState([]);
            const [selectedRoomId, setSelectedRoomId] = useState(null);
            const [message, setMessage] = useState('');
            const [loading, setLoading] = useState(true);

            const selectedRoom = rooms.find(r => r.id === selectedRoomId);

            // 1. 인증 로직
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("인증 에러:", err);
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            // 2. 실시간 데이터 구독
            useEffect(() => {
                if (!user) return;

                const roomsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms');
                const unsubRooms = roomsRef.onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (data.length === 0) initializeRooms();
                    else {
                        setRooms(data);
                        setLoading(false);
                    }
                });

                const outdoorRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('outdoor');
                const unsubOutdoor = outdoorRef.onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (data.length === 0) initializeOutdoor();
                    else setOutdoorTasks(data);
                });

                return () => { unsubRooms(); unsubOutdoor(); };
            }, [user]);

            const initializeRooms = async () => {
                const init = [
                    { id: '1-S', name: '1인실', floor: 1, doorCode: '1121', status: '공실', guestName: '', memo: '', quickChecks: { terrace: false, window: false }, checklist: { utensils: false, lights: false, bathroom: false, floor: false, terrace: false, tv: false, mosquito: false, aircon: false, plants: false, boiler: false } },
                    { id: '1-A', name: 'A룸', floor: 1, doorCode: '1470', status: '공실', guestName: '', memo: '', quickChecks: { terrace: false, window: false }, checklist: { utensils: false, lights: false, bathroom: false, floor: false, terrace: false, tv: false, mosquito: false, aircon: false, plants: false, boiler: false } },
                    { id: '1-R', name: 'R룸', floor: 1, doorCode: '2580', status: '공실', guestName: '', memo: '', quickChecks: { terrace: false, window: false }, checklist: { utensils: false, lights: false, bathroom: false, floor: false, terrace: false, tv: false, mosquito: false, aircon: false, plants: false, boiler: false } },
                    { id: '2-O', name: 'O룸', floor: 2, doorCode: '3690', status: '공실', guestName: '', memo: '', quickChecks: { terrace: false, window: false }, checklist: { utensils: false, lights: false, bathroom: false, floor: false, terrace: false, tv: false, mosquito: false, aircon: false, plants: false, boiler: false } },
                    { id: '2-M', name: 'M룸', floor: 2, doorCode: '1230', status: '공실', guestName: '', memo: '', quickChecks: { terrace: false, window: false }, checklist: { utensils: false, lights: false, bathroom: false, floor: false, terrace: false, tv: false, mosquito: false, aircon: false, plants: false, boiler: false } },
                    { id: '3-I', name: 'I룸', floor: 3, doorCode: '4560', status: '공실', guestName: '', memo: '', quickChecks: { terrace: false, window: false }, checklist: { utensils: false, lights: false, bathroom: false, floor: false, terrace: false, tv: false, mosquito: false, aircon: false, plants: false, boiler: false } },
                    { id: '3-N', name: 'N룸', floor: 3, doorCode: '7890', status: '공실', guestName: '', memo: '', quickChecks: { terrace: false, window: false }, checklist: { utensils: false, lights: false, bathroom: false, floor: false, terrace: false, tv: false, mosquito: false, aircon: false, plants: false, boiler: false } }
                ];
                const roomsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms');
                for (const r of init) { await roomsRef.doc(r.id).set(r); }
            };

            const initializeOutdoor = async () => {
                const init = [
                    { id: 'pool', label: '수영장', checked: false, order: 1 }, { id: 'yard', label: '마당', checked: false, order: 2 },
                    { id: 'bbq', label: '바베큐장', checked: false, order: 3 }, { id: 'trash', label: '쓰레기장', checked: false, order: 4 },
                    { id: 'stairs', label: '계단청소', checked: false, order: 5 }, { id: 'entrance', label: '현관등', checked: false, order: 6 },
                    { id: 'dryer', label: '건조기', checked: false, order: 7 }, { id: 'laundry', label: '빨래', checked: false, order: 8 },
                    { id: 'supplies', label: '비품', checked: false, order: 9 }
                ];
                const outdoorRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('outdoor');
                for (const t of init) { await outdoorRef.doc(t.id).set(t); }
            };

            const updateRoomData = async (id, fields) => {
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(id);
                await docRef.update(fields);
            };

            const getStatusStyle = (status) => {
                switch (status) {
                    case '입실': return 'bg-emerald-600 text-white border-emerald-700 shadow-xl';
                    case '연박': return 'bg-slate-400 text-white border-slate-500 shadow-xl'; 
                    default: return 'bg-white text-slate-500 border-slate-300 shadow-lg';
                }
            };

            const RoomCard = ({ room }) => {
                const complete = Object.values(room.checklist || {}).every(v => v === true);
                const hasMemo = room.memo && room.memo.trim().length > 0;
                
                return (
                    <div onClick={() => setSelectedRoomId(room.id)} className={`relative flex flex-col items-center justify-start py-5 w-32 h-72 sm:w-36 sm:h-80 rounded-[32px] border-b-8 transition-all duration-300 ${getStatusStyle(room.status)} active:scale-95 cursor-pointer hover:brightness-105 hover:-translate-y-2`}>
                        <span className="text-3xl font-black tracking-tighter mb-1 uppercase leading-none drop-shadow-md">{room.name}</span>
                        <div className={`text-2xl font-black tracking-widest px-4 py-1.5 rounded-2xl mb-2 shadow-inner ${room.status === '공실' ? 'text-slate-900 bg-slate-100' : 'text-white bg-black/30'}`}>{room.doorCode}</div>
                        <span className={`text-base font-black mb-2 truncate w-full px-2 text-center ${room.status === '공실' ? 'text-slate-400 italic' : 'text-white'}`}>{room.guestName || "예약자 없음"}</span>
                        <div className={`flex items-center gap-1.5 text-[11px] font-black mb-2 px-3 py-1 rounded-full shadow-md ${complete ? 'bg-emerald-500 text-white' : 'bg-amber-400 text-amber-900'}`}>
                            {complete ? <Check size={12} strokeWidth={4} /> : <AlertCircle size={12} />} {complete ? "점검완료" : "점검중"}
                        </div>
                        {hasMemo && <div className="flex items-center gap-1.5 text-[11px] font-black mb-2 px-3 py-1 rounded-full shadow-md bg-purple-600 text-white"><FileText size={12} /> 메모 있음</div>}
                        <span className={`text-sm font-black uppercase tracking-[0.2em] mt-auto mb-4 px-4 py-1.5 rounded-xl shadow-lg ${room.status === '공실' ? 'bg-slate-200 text-slate-600 border border-slate-300' : 'bg-black/20 text-white'}`}>{room.status}</span>
                        <div className="w-full px-3 flex justify-center gap-3 pt-3 border-t border-black/10 mt-auto mb-2">
                            {['terrace', 'window'].map(field => (
                                <div key={field} onClick={(e) => { e.stopPropagation(); updateRoomData(room.id, { [`quickChecks.${field}`]: !room.quickChecks[field] }); }} className={`flex flex-col items-center gap-1 transition-all ${room.quickChecks[field] ? 'opacity-100' : 'opacity-40'}`}>
                                    <CheckSquare size={18} className={room.quickChecks[field] ? (room.status === '공실' ? "text-emerald-600" : "text-yellow-300") : ""} />
                                    <span className="text-[10px] font-black uppercase">{field === 'terrace' ? '테라스' : '유리창'}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            if (loading) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white font-black tracking-widest uppercase animate-pulse">ROMHOUSE Loading...</div>;

            return (
                <div className="min-h-screen flex flex-col overflow-hidden">
                    <header className="bg-slate-800 px-6 py-6 flex flex-col items-center shrink-0 z-10 shadow-2xl border-b border-slate-800">
                        <h1 className="text-4xl font-black tracking-tighter text-white leading-tight">ROMHOUSE</h1>
                        <p className="text-[12px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-1">Premium Resort Management</p>
                    </header>

                    <main className="flex-1 p-4 flex flex-col gap-12 max-w-3xl mx-auto w-full overflow-y-auto scroll-hide pb-32 pt-10 scroll-smooth">
                        {[1, 2, 3].map(floor => (
                            <section key={floor} className="space-y-8 animate-in fade-in duration-700">
                                <div className="flex items-center gap-5 px-3">
                                    <span className="bg-slate-900 text-white text-sm px-5 py-2 rounded-2xl font-black shadow-2xl tracking-[0.2em] border border-slate-700">{floor}F</span>
                                    <div className="h-[4px] flex-1 bg-slate-300 rounded-full shadow-inner"></div>
                                </div>
                                <div className="flex justify-center flex-wrap gap-6">
                                    {rooms.filter(r => r.floor === floor).sort((a,b) => a.id.localeCompare(b.id)).map(room => <RoomCard key={room.id} room={room} />)}
                                </div>
                            </section>
                        ))}

                        <section className="bg-orange-100/90 rounded-[50px] p-10 border-4 border-orange-200 shadow-2xl mt-10 relative overflow-hidden ring-8 ring-white/40">
                            <div className="flex items-center gap-5 mb-10 relative z-10">
                                <span className="bg-orange-700 text-white text-xs px-6 py-2.5 rounded-2xl font-black uppercase">Outdoor Area</span>
                                <div className="h-[5px] flex-1 bg-orange-300 rounded-full shadow-inner"></div>
                            </div>
                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5 relative z-10">
                                {outdoorTasks.sort((a,b) => a.order - b.order).map(task => (
                                    <button key={task.id} onClick={async () => { await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('outdoor').doc(task.id).update({ checked: !task.checked }); }} className={`flex flex-col items-center justify-center p-6 rounded-[40px] border-4 transition-all gap-5 active:scale-90 ${task.checked ? 'bg-orange-600 border-orange-800 text-white shadow-xl scale-105 z-20' : 'bg-white border-white text-slate-500 hover:border-orange-200 shadow-xl'}`}>
                                        <div className={`p-5 rounded-[28px] shadow-lg ${task.checked ? 'bg-white text-orange-600' : 'bg-slate-100'}`}>
                                            {task.id === 'pool' && <Waves size={24} />} {task.id === 'yard' && <TreePine size={24} />} {task.id === 'bbq' && <Flame size={24} />}
                                            {task.id === 'trash' && <Trash2 size={24} />} {task.id === 'stairs' && <Layers size={24} />} {task.id === 'entrance' && <Lightbulb size={24} />}
                                            {task.id === 'dryer' && <Wind size={24} />} {task.id === 'laundry' && <Shirt size={24} />} {task.id === 'supplies' && <Package size={24} />}
                                        </div>
                                        <span className="text-lg font-black tracking-tighter uppercase leading-none">{task.label}</span>
                                    </button>
                                ))}
                            </div>
                        </section>
                    </main>

                    {selectedRoom && (
                        <div className="fixed inset-0 bg-slate-900/85 backdrop-blur-2xl z-50 flex items-end sm:items-center justify-center p-4">
                            <div className="bg-white w-full max-w-lg rounded-[60px] p-10 shadow-2xl animate-in slide-in-from-bottom duration-500 max-h-[92vh] overflow-y-auto border-t-[12px] border-slate-900 scroll-hide">
                                <div className="flex justify-between items-start mb-10">
                                    <div>
                                        <p className="text-[13px] font-black text-slate-400 uppercase mb-3">{selectedRoom.floor}F UNIT</p>
                                        <h2 className="text-6xl font-black text-slate-900 leading-none tracking-tighter mb-4">{selectedRoom.name}</h2>
                                        <div className="bg-blue-700 text-white px-6 py-2.5 rounded-[24px] font-black text-2xl shadow-xl inline-block">CODE: {selectedRoom.doorCode}</div>
                                    </div>
                                    <button onClick={() => setSelectedRoomId(null)} className="p-4 bg-slate-100 hover:bg-slate-200 rounded-full transition-all active:scale-90"><X size={36} className="text-slate-500" /></button>
                                </div>
                                <div className="mb-10 space-y-8">
                                    <section>
                                        <h3 className="text-sm font-black text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-3"><User size={20} className="text-slate-400" /> 예약자 성함</h3>
                                        <input type="text" value={selectedRoom.guestName || ''} onChange={(e) => updateRoomData(selectedRoom.id, { guestName: e.target.value })} className="w-full bg-slate-100 border-4 border-slate-100 rounded-[32px] px-8 py-5 text-3xl font-black text-slate-900 focus:outline-none focus:border-blue-600 shadow-inner" placeholder="성함 입력" />
                                    </section>
                                    <section>
                                        <h3 className="text-sm font-black text-slate-500 mb-5 flex items-center gap-3"><Info size={20} className="text-slate-400" /> 투숙 상태</h3>
                                        <div className="grid grid-cols-3 bg-slate-100 p-2.5 rounded-[36px] gap-3">
                                            {['입실', '연박', '공실'].map(s => (
                                                <button key={s} onClick={() => updateRoomData(selectedRoom.id, { status: s })} className={`flex items-center justify-center gap-3 py-5 rounded-[28px] font-black text-xl transition-all ${selectedRoom.status === s ? 'bg-white text-slate-900 shadow-xl scale-105' : 'text-slate-400'}`}>
                                                    <div className={`w-5 h-5 rounded-full border-4 ${selectedRoom.status === s ? (s === '연박' ? 'bg-slate-400 border-slate-400' : 'bg-blue-600 border-blue-600') : 'bg-transparent border-slate-300'}`} /> {s}
                                                </button>
                                            ))}
                                        </div>
                                    </section>
                                    <section>
                                        <div className="flex justify-between items-end mb-5">
                                            <h3 className="text-sm font-black text-slate-500">시설 점검</h3>
                                            <div className="flex gap-2">
                                                <button onClick={() => {
                                                    const newCheck = {}; Object.keys(selectedRoom.checklist).forEach(k => newCheck[k] = true);
                                                    updateRoomData(selectedRoom.id, { checklist: newCheck });
                                                }} className="text-[12px] font-black text-emerald-700 bg-emerald-100 px-4 py-2 rounded-2xl">전체 체크</button>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            {Object.entries(selectedRoom.checklist || {}).map(([key, val]) => (
                                                <button key={key} onClick={() => updateRoomData(selectedRoom.id, { [`checklist.${key}`]: !val })} className={`flex items-center gap-5 p-5 rounded-[30px] border-4 transition-all text-left ${val ? 'bg-emerald-50 border-emerald-500 text-emerald-900 shadow-md' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>
                                                    <div className={`w-8 h-8 rounded-xl flex items-center justify-center border-4 ${val ? 'bg-emerald-600 border-emerald-600 shadow-lg' : 'bg-white border-slate-200'}`}>{val && <Check size={20} strokeWidth={5} color="white" />}</div>
                                                    <span className="text-[18px] font-black">{ {utensils:'집기류', lights:'조명', bathroom:'화장실', floor:'바닥청소', terrace:'테라스', tv:'TV', mosquito:'모기향', aircon:'에어컨', plants:'화분', boiler:'보일러'}[key] }</span>
                                                </button>
                                            ))}
                                        </div>
                                    </section>
                                    <section>
                                        <h3 className="text-sm font-black text-slate-500 uppercase mb-4 flex items-center gap-3"><FileText size={20} className="text-slate-400" /> 관리 메모</h3>
                                        <textarea value={selectedRoom.memo || ''} onChange={(e) => updateRoomData(selectedRoom.id, { memo: e.target.value })} rows="4" className="w-full bg-slate-100 border-4 border-slate-100 rounded-[36px] px-8 py-6 text-lg font-bold text-slate-900 focus:outline-none focus:border-purple-600 shadow-inner resize-none" placeholder="메모 입력" />
                                    </section>
                                </div>
                                <button onClick={() => setSelectedRoomId(null)} className="w-full py-7 bg-slate-900 text-white rounded-[32px] font-black text-2xl tracking-[0.4em] uppercase shadow-2xl active:scale-95 border-b-8 border-black">저장 완료</button>
                            </div>
                        </div>
                    )}
                    {message && <div className="fixed top-28 left-1/2 -translate-x-1/2 z-[60] bg-slate-900 text-white px-8 py-4 rounded-3xl text-base font-black shadow-2xl animate-in fade-in zoom-in duration-300 flex items-center gap-3 border-2 border-slate-700"><CheckCircle size={24} className="text-emerald-400" />{message}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
